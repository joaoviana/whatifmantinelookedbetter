<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="base" cx="34%" cy="28%" r="78%">
      <stop offset="0%" stop-color="#fde7f3" />
      <stop offset="42%" stop-color="#f9a8d4" />
      <stop offset="100%" stop-color="#ec4899" />
    </radialGradient>
    <radialGradient id="blobA" cx="74%" cy="72%" r="58%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="blobB" cx="80%" cy="24%" r="46%">
      <stop offset="0%" stop-color="#f0abfc" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#f0abfc" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bloom" cx="40%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="n" />
      <feColorMatrix in="n" type="saturate" values="0" />
      <feComponentTransfer><feFuncA type="linear" slope="0.14" /></feComponentTransfer>
      <feComposite operator="in" in2="SourceGraphic" />
